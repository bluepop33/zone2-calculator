<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>일본어 히라가나 가타카나 학습</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f8f8f6;color:#1a1a1a;min-height:100vh;}
.app{max-width:480px;margin:0 auto;padding:16px 12px 40px;}
h1{font-size:18px;font-weight:500;color:#1a1a1a;margin-bottom:4px;padding-top:8px;}
.subtitle{font-size:12px;color:#888;margin-bottom:16px;}
.tabs{display:flex;gap:6px;margin-bottom:16px;}
.tab{flex:1;padding:12px 4px;border-radius:8px;border:1px solid #e0e0da;background:white;color:#888;cursor:pointer;font-size:14px;text-align:center;font-family:inherit;}
.tab.active{background:#f0f0ec;color:#1a1a1a;font-weight:500;border-color:#ccc;}
.sec{display:none;}.sec.active{display:block;}
.sec-title{font-size:16px;font-weight:500;color:#1a1a1a;margin-bottom:3px;}
.sec-hint{font-size:12px;color:#888;margin-bottom:10px;}
.prog-bg{background:#e8e8e4;border-radius:6px;height:6px;margin-bottom:14px;}
.prog-bar{background:#1D9E75;height:6px;border-radius:6px;transition:width .3s;}
.row-label{font-size:12px;color:#888;margin:14px 0 6px;padding-left:2px;}
.row-label.taku{color:#854F0B;}
.cgrid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-bottom:2px;}
.ccard{background:white;border:1px solid #e8e8e4;border-radius:8px;padding:14px 4px;text-align:center;cursor:pointer;user-select:none;min-height:60px;display:flex;align-items:center;justify-content:center;transition:background .1s;}
.ccard:active{background:#f0f0ec;}
.ccard.taku{border-color:#FAC775;}
.ccard .jp{font-size:28px;color:#1a1a1a;line-height:1;}

/* 오버레이 */
.overlay-wrap{position:relative;}
.overlay{display:none;position:fixed;inset:0;z-index:50;background:rgba(0,0,0,0.45);}
.overlay.open{display:block;}
.popup{background:white;border-radius:20px;width:88%;max-width:320px;text-align:center;overflow:hidden;cursor:pointer;box-shadow:0 4px 24px rgba(0,0,0,0.15);position:absolute;left:50%;transform:translateX(-50%);}
.popup-jp{font-size:100px;line-height:1.05;color:#1a1a1a;padding:24px 16px 8px;}
.popup-kor{font-size:36px;font-weight:500;color:#0F6E56;padding:0 16px 10px;display:none;}
.popup-word-area{display:none;padding:0 20px 16px;}
.popup-word{font-size:24px;color:#1a1a1a;margin-bottom:4px;}
.popup-word-sub{font-size:15px;color:#888;}
.popup-word-mean{font-size:18px;color:#0F6E56;font-weight:500;margin-top:5px;}
.popup-hint{font-size:12px;color:#aaa;padding:6px 16px 10px;min-height:32px;}
.popup-steps{display:flex;gap:7px;justify-content:center;padding-bottom:10px;}
.pdot{width:8px;height:8px;border-radius:50%;background:#ddd;}
.pdot.on{background:#1D9E75;}
.popup-close{font-size:14px;color:#888;padding:12px;cursor:pointer;border-top:1px solid #f0f0ec;}

/* 단어 */
.wfilter{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap;}
.wfilter button{padding:8px 12px;border-radius:8px;border:1px solid #e0e0da;background:white;cursor:pointer;font-size:13px;color:#888;font-family:inherit;}
.wfilter button.active{background:#f0f0ec;color:#1a1a1a;font-weight:500;}
.wgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;}
.wcard{background:white;border:1px solid #e8e8e4;border-radius:12px;padding:16px 10px;text-align:center;cursor:pointer;user-select:none;min-height:76px;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:all .15s;}
.wcard:active{background:#f5f5f2;}
.wcard.revealed{background:#E1F5EE;border-color:#1D9E75;}
.wcard .wjp{font-size:26px;color:#1a1a1a;line-height:1.2;}
.wcard .wrev{display:none;margin-top:6px;}
.wcard .wkor{font-size:14px;color:#0F6E56;font-weight:500;}
.wcard .wmean{font-size:13px;color:#888;margin-top:2px;}
.wcard .wtype{font-size:11px;color:#bbb;margin-top:5px;}

/* 퀴즈 */
.qmode{display:flex;gap:6px;margin-bottom:14px;}
.qmode button{flex:1;padding:11px 4px;border-radius:8px;border:1px solid #e0e0da;background:white;cursor:pointer;font-size:13px;color:#888;font-family:inherit;}
.qmode button.active{background:#f0f0ec;color:#1a1a1a;font-weight:500;}
.quiz-score{font-size:13px;color:#888;margin-bottom:8px;}
.quiz-q{font-size:88px;text-align:center;padding:28px 16px;background:#f0f0ec;border-radius:16px;margin-bottom:14px;color:#1a1a1a;line-height:1;}
.qchoices{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:10px;}
.qchoice{padding:18px 8px;font-size:22px;text-align:center;border-radius:10px;border:1px solid #e0e0da;cursor:pointer;background:white;color:#1a1a1a;font-family:inherit;transition:all .1s;}
.qchoice:active{background:#f0f0ec;}
.qchoice.correct{background:#E1F5EE;border-color:#1D9E75;color:#0F6E56;}
.qchoice.wrong{background:#FCEBEB;border-color:#E24B4A;color:#A32D2D;}
.qresult{font-size:16px;margin-bottom:10px;min-height:24px;text-align:center;}
.qnext{padding:15px;width:100%;border-radius:10px;border:1px solid #e0e0da;background:white;cursor:pointer;font-size:17px;color:#1a1a1a;font-family:inherit;}
</style>
</head>
<body>
<div class="app">
  <h1>일본어 문자 학습</h1>
  <p class="subtitle">히라가나 · 가타카나 · 단어 · 퀴즈</p>

  <div class="tabs">
    <button class="tab active" onclick="showSec('hira',this)">히라가나</button>
    <button class="tab" onclick="showSec('kata',this)">가타카나</button>
    <button class="tab" onclick="showSec('words',this)">단어</button>
    <button class="tab" onclick="showSec('quiz',this)">퀴즈</button>
  </div>

  <div id="hira" class="sec active">
    <p class="sec-title">히라가나 (平仮名)</p>
    <p class="sec-hint">터치 → 발음 → 단어</p>
    <div class="prog-bg"><div class="prog-bar" id="hprog" style="width:0%"></div></div>
    <div class="overlay-wrap" id="hira-wrap">
      <div class="overlay" id="hira-overlay" onclick="if(event.target===this)closeOverlay('hira')">
        <div class="popup" onclick="overlayTap('hira',event)">
          <div class="popup-jp" id="h-pjp"></div>
          <div class="popup-kor" id="h-pkor"></div>
          <div class="popup-word-area" id="h-pword">
            <div class="popup-word" id="h-pw"></div>
            <div class="popup-word-sub" id="h-pwsub"></div>
            <div class="popup-word-mean" id="h-pwmean"></div>
          </div>
          <div class="popup-hint" id="h-phint"></div>
          <div class="popup-steps"><span class="pdot" id="hd0"></span><span class="pdot" id="hd1"></span><span class="pdot" id="hd2"></span></div>
          <div class="popup-close" onclick="closeOverlay('hira')">닫기</div>
        </div>
      </div>
      <div id="hira-grid"></div>
    </div>
  </div>

  <div id="kata" class="sec">
    <p class="sec-title">가타카나 (片仮名)</p>
    <p class="sec-hint">터치 → 발음 → 단어</p>
    <div class="prog-bg"><div class="prog-bar" id="kprog" style="width:0%"></div></div>
    <div class="overlay-wrap" id="kata-wrap">
      <div class="overlay" id="kata-overlay" onclick="if(event.target===this)closeOverlay('kata')">
        <div class="popup" onclick="overlayTap('kata',event)">
          <div class="popup-jp" id="k-pjp"></div>
          <div class="popup-kor" id="k-pkor"></div>
          <div class="popup-word-area" id="k-pword">
            <div class="popup-word" id="k-pw"></div>
            <div class="popup-word-sub" id="k-pwsub"></div>
            <div class="popup-word-mean" id="k-pwmean"></div>
          </div>
          <div class="popup-hint" id="k-phint"></div>
          <div class="popup-steps"><span class="pdot" id="kd0"></span><span class="pdot" id="kd1"></span><span class="pdot" id="kd2"></span></div>
          <div class="popup-close" onclick="closeOverlay('kata')">닫기</div>
        </div>
      </div>
      <div id="kata-grid"></div>
    </div>
  </div>

  <div id="words" class="sec">
    <p class="sec-title">단어 익히기</p>
    <p class="sec-hint">터치하면 읽는 법과 뜻이 보여요</p>
    <div class="wfilter">
      <button class="active" onclick="filterW('all',this)">전체</button>
      <button onclick="filterW('hira',this)">히라가나</button>
      <button onclick="filterW('kata',this)">가타카나</button>
      <button onclick="filterW('food',this)">음식</button>
      <button onclick="filterW('nature',this)">자연</button>
      <button onclick="filterW('daily',this)">일상</button>
    </div>
    <div class="wgrid" id="wgrid"></div>
  </div>

  <div id="quiz" class="sec">
    <p class="sec-title">퀴즈</p>
    <div class="qmode">
      <button id="qm-hira" class="active" onclick="setQM('hira')">히라가나</button>
      <button id="qm-kata" onclick="setQM('kata')">가타카나</button>
      <button id="qm-both" onclick="setQM('both')">둘 다</button>
    </div>
    <div class="quiz-score" id="qscore">점수: 0 / 0</div>
    <div class="quiz-q" id="qq"></div>
    <div class="qchoices" id="qchoices"></div>
    <div class="qresult" id="qresult"></div>
    <button class="qnext" id="qnext" onclick="nextQ()" style="display:none">다음 →</button>
  </div>
</div>

const charMap={};
[...HR,...KR].forEach(row=>row.chars.forEach(c=>{charMap[c.j]=c;}));
let popupState={hira:0,kata:0};
let currentChar={hira:null,kata:null};

function buildGrid(type){
  const rows=type==='hira'?HR:KR;
  const container=document.getElementById(type+'-grid');
  container.innerHTML='';
  rows.forEach(row=>{
    const lbl=document.createElement('div');
    lbl.className='row-label'+(row.taku?' taku':'');
    lbl.textContent=row.r;
    container.appendChild(lbl);
    const grid=document.createElement('div');grid.className='cgrid';
    row.chars.forEach(c=>{
      const card=document.createElement('div');
      card.className='ccard'+(row.taku?' taku':'');
      card.innerHTML='<span class="jp">'+c.j+'</span>';
      card.onclick=(e)=>openPopup(type,c,e);
      grid.appendChild(card);
    });
    container.appendChild(grid);
  });
}

function openPopup(type,c,event){
  currentChar[type]=c;popupState[type]=0;
  const ol=document.getElementById(type+'-overlay');
  ol.classList.add('open');
  renderPopup(type);
  const popup=ol.querySelector('.popup');
  const winH=window.innerHeight;
  const popupH=popup.offsetHeight||360;
  const touchY=event?(event.changedTouches?event.changedTouches[0].clientY:event.clientY):winH/2;
  let top=touchY-popupH/2;
  if(top<16)top=16;
  if(top+popupH>winH-16)top=winH-popupH-16;
  popup.style.top=top+'px';
}

function renderPopup(type){
  const c=currentChar[type];const s=popupState[type];const p=type==='hira'?'h':'k';
  document.getElementById(p+'-pjp').textContent=c.j;
  const korEl=document.getElementById(p+'-pkor');
  const wordArea=document.getElementById(p+'-pword');
  const hintEl=document.getElementById(p+'-phint');
  korEl.style.display=s>=1?'block':'none';
  if(s>=1)korEl.textContent=c.k;
  wordArea.style.display=s>=2?'block':'none';
  if(s>=2){
    const cw=CW[c.j];
    if(cw){
      document.getElementById(p+'-pw').textContent=cw.w;
      document.getElementById(p+'-pwsub').textContent=cw.wr;
      document.getElementById(p+'-pwmean').textContent=cw.wm;
    }
  }
  hintEl.textContent=s===0?'터치하면 읽는 법이 보여요':(s===1?(HINTS[c.j]||'한 번 더 터치하면 단어가!'):'닫기를 눌러 다른 글자로');
  for(let i=0;i<3;i++){
    const d=document.getElementById((type==='hira'?'hd':'kd')+i);
    if(d)d.className='pdot'+(i<=s?' on':'');
  }
}

function overlayTap(type,event){
  event.stopPropagation();
  const s=popupState[type];
  if(s<2){popupState[type]=s+1;renderPopup(type);}
}
function closeOverlay(type){document.getElementById(type+'-overlay').classList.remove('open');}

const wStates={};let wFilter='all';
function filterW(cat,el){
  wFilter=cat;
  document.querySelectorAll('.wfilter button').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');renderWords();
}
function renderWords(){
  const list=WORDS.filter(w=>wFilter==='all'||w.type===wFilter||w.cat===wFilter);
  const grid=document.getElementById('wgrid');grid.innerHTML='';
  list.forEach(w=>{
    const card=document.createElement('div');
    card.className='wcard'+(wStates[w.jp]?' revealed':'');
    card.innerHTML='<div class="wjp">'+w.jp+'</div>'
      +'<div class="wrev" style="display:'+(wStates[w.jp]?'block':'none')+'">'
      +'<div class="wkor">'+w.k+'</div><div class="wmean">'+w.m+'</div></div>'
      +'<div class="wtype">'+(w.type==='hira'?'히라가나':'가타카나')+'</div>';
    card.onclick=()=>{
      wStates[w.jp]=!wStates[w.jp];
      card.className='wcard'+(wStates[w.jp]?' revealed':'');
      card.querySelector('.wrev').style.display=wStates[w.jp]?'block':'none';
    };
    grid.appendChild(card);
  });
}

let qMode='hira',qOK=0,qTotal=0,qAnswered=false;
function getAllC(t){return(t==='hira'?HR:KR).flatMap(r=>r.chars);}
function setQM(m){
  qMode=m;
  document.querySelectorAll('.qmode button').forEach(b=>b.classList.remove('active'));
  document.getElementById('qm-'+m).classList.add('active');
  qOK=0;qTotal=0;document.getElementById('qscore').textContent='점수: 0 / 0';startQ();
}
function qPool(){
  if(qMode==='hira')return getAllC('hira');
  if(qMode==='kata')return getAllC('kata');
  return[...getAllC('hira'),...getAllC('kata')];
}
function startQ(){
  qAnswered=false;
  document.getElementById('qresult').textContent='';
  document.getElementById('qnext').style.display='none';
  const pool=qPool();const correct=pool[Math.floor(Math.random()*pool.length)];
  document.getElementById('qq').textContent=correct.j;
  const wrong=pool.filter(c=>c.k!==correct.k);const choices=[correct];
  while(choices.length<4){const w=wrong[Math.floor(Math.random()*wrong.length)];if(!choices.find(c=>c.k===w.k))choices.push(w);}
  choices.sort(()=>Math.random()-0.5);
  const cont=document.getElementById('qchoices');cont.innerHTML='';
  choices.forEach(c=>{
    const btn=document.createElement('button');btn.className='qchoice';
    btn.textContent=c.k;btn.onclick=()=>checkQ(c.k,correct.k);cont.appendChild(btn);
  });
}
function checkQ(chosen,correct){
  if(qAnswered)return;qAnswered=true;qTotal++;
  document.querySelectorAll('.qchoice').forEach(b=>{
    if(b.textContent===correct)b.classList.add('correct');
    else if(b.textContent===chosen&&chosen!==correct)b.classList.add('wrong');
  });
  const r=document.getElementById('qresult');
  if(chosen===correct){qOK++;r.textContent='정답! 잘 하셨어요!';r.style.color='#1D9E75';}
  else{r.textContent='아쉬워요. 정답은 '+correct+' 이에요.';r.style.color='#A32D2D';}
  document.getElementById('qscore').textContent='점수: '+qOK+' / '+qTotal;
  document.getElementById('qnext').style.display='block';
}
function nextQ(){startQ();}
function showSec(id,el){
  document.querySelectorAll('.sec').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById(id).classList.add('active');el.classList.add('active');
  if(id==='quiz')startQ();if(id==='words')renderWords();
}
buildGrid('hira');buildGrid('kata');renderWords();startQ();
